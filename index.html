<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BD Live TV Portal</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Arial, sans-serif;
            background-color: #0b0e14;
            color: #ffffff;
        }

        header {
            background-color: #006a4e; /* Bangladesh Green */
            padding: 15px 20px;
            border-bottom: 4px solid #f42a41; /* Bangladesh Red */
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        header h1 {
            margin: 0;
            font-size: 1.4rem;
            color: #ffffff;
        }

        .live-badge {
            background-color: #f42a41;
            padding: 4px 10px;
            border-radius: 20px;
            font-weight: bold;
            font-size: 0.8rem;
        }

        .main-container {
            display: flex;
            flex-direction: column;
            max-width: 1400px;
            margin: 15px auto;
            padding: 0 15px;
            gap: 15px;
        }

        @media (min-width: 992px) {
            .main-container {
                flex-direction: row;
            }
        }

        .player-section {
            flex: 3;
        }

        /* Responsive Player Container */
        .video-wrapper {
            position: relative;
            padding-bottom: 56.25%; /* 16:9 Aspect Ratio */
            height: 0;
            overflow: hidden;
            border-radius: 10px;
            background: #000;
            border: 1px solid #1f2736;
            box-shadow: 0 8px 25px rgba(0,0,0,0.5);
        }

        .video-wrapper iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: 0;
        }

        .current-playing {
            margin-top: 12px;
            font-size: 1.1rem;
            font-weight: bold;
            color: #00ffaa;
        }

        /* Sidebar Channel Selector */
        .channel-sidebar {
            flex: 1.2;
            background-color: #131924;
            border-radius: 10px;
            border: 1px solid #1f2736;
            display: flex;
            flex-direction: column;
        }

        .sidebar-header {
            padding: 12px;
            border-bottom: 1px solid #1f2736;
            font-weight: bold;
            background-color: #1a2233;
            border-radius: 10px 10px 0 0;
            color: #00ffaa;
        }

        .channel-list {
            padding: 10px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            max-height: 450px;
            overflow-y: auto;
        }

        .channel-item {
            display: flex;
            align-items: center;
            background-color: #1c2536;
            border: 1px solid #28344a;
            color: #fff;
            padding: 12px;
            border-radius: 6px;
            cursor: pointer;
            text-align: left;
            font-size: 0.95rem;
            width: 100%;
            box-sizing: border-box;
            transition: all 0.2s ease;
        }

        .channel-item:hover {
            background-color: #24324a;
            border-color: #00ffaa;
        }

        .channel-item.active {
            background-color: #006a4e;
            border-color: #00ffaa;
            font-weight: bold;
        }

        .channel-item::before {
            content: "🔴";
            margin-right: 10px;
            font-size: 0.8rem;
        }
    </style>
</head>
<body>

    <header>
        <h1>🇧🇩 BD ONLINE TV (ডাউনলোড ছাড়া লাইভ)</h1>
        <div class="live-badge">LIVE</div>
    </header>

    <div class="main-container">
        
        <div class="player-section">
            <div class="video-wrapper">
                <iframe 
                    id="tv-frame"
                    src="https://www.youtube.com/embed/live_stream?channel=UC99Fbe9wIor1b6onS_sz0Sg&autoplay=1" 
                    allow="autoplay; encrypted-media; picture-in-picture" 
                    allowfullscreen>
                </iframe>
            </div>
            <div class="current-playing" id="playing-title">Now Playing: Somoy TV (সময় টিভি)</div>
        </div>

        <div class="channel-sidebar">
            <div class="sidebar-header">চ্যানেল সিলেক্ট করুন:</div>
            <div class="channel-list">
                
                <button class="channel-item active" onclick="switchLive('UC99Fbe9wIor1b6onS_sz0Sg', 'Somoy TV (সময় টিভি)', this)">
                    Somoy TV
                </button>
                
                <button class="channel-item" onclick="switchLive('UC7V8nAsG9itZbeZgK18R9pA', 'Jamuna TV (যমুনা টিভি)', this)">
                    Jamuna TV
                </button>
                
                <button class="channel-item" onclick="switchLive('UCsreKstXkfR77GbyE7-7S4Q', 'Independent TV (ইনডিপেনডেন্ট)', this)">
                    Independent TV
                </button>

                <button class="channel-item" onclick="switchLive('UC9m8V-WAnEGlp_fS0fK7yMg', 'Channel 24 (চ্যানেল ২৪)', this)">
                    Channel 24
                </button>

                <button class="channel-item" onclick="switchLive('UCbB7fR869LXO7S869yO4Sww', 'Ekattor TV (একাত্তর টিভি)', this)">
                    Ekattor TV
                </button>
                
            </div>
        </div>

    </div>

    <script>
        // Directly maps and switches official Live parameters instantly without loading errors
        function switchLive(channelId, channelName, element) {
            var frame = document.getElementById('tv-frame');
            
            // Rebuilds direct direct-play live embed stream url link structure
            frame.src = "https://www.youtube.com/embed/live_stream?channel=" + channelId + "&autoplay=1";
            
            // Adjust visual states 
            document.getElementById('playing-title').innerText = "Now Playing: " + channelName;
            document.querySelectorAll('.channel-item').forEach(item => item.classList.remove('active'));
            element.classList.add('active');
        }
    </script>
</body>
</html>
