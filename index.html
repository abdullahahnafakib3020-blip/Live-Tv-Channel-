<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bangladesh Live TV Portal</title>
    
    <link href="https://vjs.zencdn.net/8.10.0/video-js.css" rel="stylesheet" />
    <link href="https://unpkg.com/@videojs/themes@1.0.1/dist/city/index.css" rel="stylesheet">

    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Arial, sans-serif;
            background-color: #0b0e14;
            color: #ffffff;
        }

        header {
            background-color: #006a4e; /* BD Green */
            padding: 15px 20px;
            border-bottom: 4px solid #f42a41; /* BD Red */
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        header h1 {
            margin: 0;
            font-size: 1.6rem;
            color: #ffffff;
            letter-spacing: 0.5px;
        }

        .live-badge {
            background-color: #f42a41;
            padding: 5px 12px;
            border-radius: 20px;
            font-weight: bold;
            font-size: 0.85rem;
            animation: blink 1.5s infinite;
        }

        @keyframes blink {
            0% { opacity: 1; }
            50% { opacity: 0.4; }
            100% { opacity: 1; }
        }

        .main-container {
            display: flex;
            flex-direction: column;
            max-width: 1500px;
            margin: 20px auto;
            padding: 0 20px;
            gap: 20px;
        }

        @media (min-width: 992px) {
            .main-container {
                flex-direction: row;
            }
        }

        .player-section {
            flex: 3;
        }

        .video-wrapper {
            position: relative;
            width: 100%;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.7);
            background: #000;
            border: 1px solid #1f2736;
        }

        .current-playing {
            margin-top: 15px;
            font-size: 1.2rem;
            font-weight: bold;
            color: #00ffaa;
        }

        .channel-sidebar {
            flex: 1.2;
            background-color: #131924;
            border-radius: 12px;
            border: 1px solid #1f2736;
            display: flex;
            flex-direction: column;
            max-height: 650px;
        }

        .sidebar-header {
            padding: 15px;
            border-bottom: 1px solid #1f2736;
            font-weight: bold;
            font-size: 1.1rem;
            background-color: #1a2233;
            border-radius: 12px 12px 0 0;
            color: #00ffaa;
        }

        .channel-list {
            overflow-y: auto;
            padding: 10px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .channel-item {
            display: flex;
            align-items: center;
            background-color: #1c2536;
            border: 1px solid #28344a;
            color: #fff;
            padding: 12px 15px;
            border-radius: 8px;
            cursor: pointer;
            text-align: left;
            font-size: 0.95rem;
            transition: all 0.2s ease;
            width: 100%;
            box-sizing: border-box;
        }

        .channel-item:hover {
            background-color: #24324a;
            border-color: #00ffaa;
        }

        .channel-item.active {
            background-color: #006a4e;
            border-color: #00ffaa;
            font-weight: bold;
        }

        .channel-item::before {
            content: "📺";
            margin-right: 12px;
            font-size: 1.1rem;
        }
    </style>
</head>
<body>

    <header>
        <h1>🇧🇩 BD IPTV Live - অনলাইন টিভি</h1>
        <div class="live-badge">🔴 LIVE</div>
    </header>

    <div class="main-container">
        
        <div class="player-section">
            <div class="video-wrapper">
                <video 
                    id="bd-tv-player" 
                    class="video-js vjs-big-play-centered vjs-theme-city" 
                    controls 
                    preload="auto" 
                    width="640" 
                    height="360"
                    data-setup='{"fluid": true}'>
                    <source src="https://mme.nextcdn.org/somoy/live/playlist.m3u8" type="application/x-mpegURL" />
                </video>
            </div>
            <div class="current-playing" id="playing-title">Now Playing: Somoy TV (সময় টিভি)</div>
        </div>

        <div class="channel-sidebar">
            <div class="sidebar-header">চ্যানেল সমূহ (Working Channels)</div>
            <div class="channel-list">
                
                <button class="channel-item active" onclick="changeChannel('https://mme.nextcdn.org/somoy/live/playlist.m3u8', 'application/x-mpegURL', 'Somoy TV (সময় টিভি)', this)">
                    Somoy TV
                </button>
                
                <button class="channel-item" onclick="changeChannel('https://starshare.live:2083/IndependentTV/index.m3u8', 'application/x-mpegURL', 'Independent TV (ইনডিপেনডেন্ট টিভি)', this)">
                    Independent TV
                </button>
                
                <button class="channel-item" onclick="changeChannel('https://starshare.live:2083/JamunaTV/index.m3u8', 'application/x-mpegURL', 'Jamuna TV (যমুনা টিভি)', this)">
                    Jamuna TV
                </button>
                
                <button class="channel-item" onclick="changeChannel('https://starshare.live:2083/BTVWorld/index.m3u8', 'application/x-mpegURL', 'BTV World (বিটিভি ওয়ার্ল্ড)', this)">
                    BTV World
                </button>
                
                <button class="channel-item" onclick="changeChannel('https://starshare.live:2083/Channel24/index.m3u8', 'application/x-mpegURL', 'Channel 24 (চ্যানেল ২৪)', this)">
                    Channel 24
                </button>

            </div>
        </div>

    </div>

    <script src="https://vjs.zencdn.net/8.10.0/video.js"></script>

    <script>
        function changeChannel(streamUrl, streamType, channelName, element) {
            var player = videojs('bd-tv-player');
            
            player.src({
                src: streamUrl,
                type: streamType
            });
            
            player.play().catch(function(error) {
                console.log("Stream loading or playback interrupted.");
            });

            document.getElementById('playing-title').innerText = "Now Playing: " + channelName;
            document.querySelectorAll('.channel-item').forEach(item => item.classList.remove('active'));
            element.classList.add('active');
        }
    </script>
</body>
    </html>
